<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>☕ Espresso Empire: Core Loop ☕</title>
    <style>
        :root {
            --bg-color: #0b0704;
            --panel-color: #160f0a;
            --border-color: #362316;
            --text-main: #f2e6da;
            --accent-gold: #e6ccb2;
            --neon-green: #06d6a0;
            --neon-blue: #118ab2;
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 20px;
            max-width: 600px;
            margin: auto;
        }

        h1 { color: var(--accent-gold); text-align: center; }
        .box {
            background-color: var(--panel-color);
            border: 2px solid var(--border-color);
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 15px;
        }

        button {
            background: linear-gradient(135deg, #7f5539, #5c3d24);
            color: #fff;
            border: 1px solid #7f5539;
            padding: 10px 15px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            border-radius: 4px;
            margin-top: 10px;
            font-size: 1.1em;
        }
        button:hover:not(:disabled) { background: linear-gradient(135deg, #a67c52, #7f5539); }
        button:disabled { background: #21150c; color: #4a3423; border-color: #1c1109; cursor: not-allowed; }

        .flex { display: flex; justify-content: space-between; align-items: center; margin: 8px 0; font-size: 1.1em; }
        
        input[type="number"] { 
            width: 80px; 
            background: #f5ebe0; 
            border: 2px solid #7f5539; 
            padding: 5px; 
            text-align: center; 
            font-weight: bold; 
            border-radius: 4px; 
        }

        /* Shift UI */
        #shift-ui { display: none; text-align: center; }
        #main-ui { display: block; }
    </style>
</head>
<body>

    <h1>☕ ESPRESSO EMPIRE ☕</h1>

    <div id="main-ui">
        <div class="box">
            <h2 style="margin-top: 0; color: var(--neon-blue); border-bottom: 1px dashed var(--border-color); padding-bottom: 10px;">📅 Day <span id="day-display">1</span></h2>
            <div class="flex"><span>💰 Cash:</span> <strong id="cash-display" style="color: var(--neon-green);">$100.00</strong></div>
            <div class="flex"><span>📦 Coffee Beans:</span> <strong id="beans-display">20</strong></div>
        </div>

        <div class="box">
            <h3 style="margin-top: 0; color: var(--accent-gold);">Supply Chain</h3>
            <button onclick="buyBeans()" id="buy-btn">Order 20 Beans ($15.00)</button>
        </div>

        <div class="box">
            <h3 style="margin-top: 0; color: var(--accent-gold);">Menu Pricing</h3>
            <div class="flex">
                <span>Price per Coffee:</span>
                <div>$<input type="number" id="price-input" value="4.00" step="0.50"></div>
            </div>
            <button onclick="openShop()" style="background: var(--neon-blue); border-color: var(--neon-blue);">🏁 OPEN SHOP FOR THE DAY 🏁</button>
        </div>
    </div>

    <div id="shift-ui">
        <div class="box" style="border-color: var(--neon-blue);">
            <h2 style="color: var(--neon-blue); margin-top: 0;">🛎️ RUSH HOUR 🛎️</h2>
            <div class="flex"><span>Customers Waiting:</span> <strong id="queue-display" style="font-size: 1.5em; color: #fff;">0</strong></div>
            <div class="flex"><span>Beans Remaining:</span> <strong id="shift-beans-display">0</strong></div>
            
            <button onclick="serveCustomer()" id="serve-btn" style="background: var(--neon-green); border-color: var(--neon-green); color: #000; padding: 15px; font-size: 1.2em; margin-top: 20px;">☕ Serve Coffee</button>
            <button onclick="endShift()" style="background: #ef476f; border-color: #ef476f; margin-top: 10px;">Close Shop Early</button>
        </div>
    </div>

    <script>
        // Game State Variables
        let cash = 100.00;
        let beans = 20;
        let day = 1;
        let currentQueue = 0;
        let currentPrice = 4.00;
        let dailyProfit = 0;

        // UI Elements
        const mainUI = document.getElementById('main-ui');
        const shiftUI = document.getElementById('shift-ui');
        
        // Update the main dashboard numbers
        function updateDashboard() {
            document.getElementById('cash-display').innerText = `$${cash.toFixed(2)}`;
            document.getElementById('beans-display').innerText = beans;
            document.getElementById('day-display').innerText = day;
            document.getElementById('buy-btn').disabled = cash < 15;
        }

        // Buy Materials
        function buyBeans() {
            if (cash >= 15) {
                cash -= 15;
                beans += 20;
                updateDashboard();
            }
        }

        // Start the Barista Shift
        function openShop() {
            if (beans <= 0) {
                alert("You have no coffee beans! Buy supplies first.");
                return;
            }

            // Get the price the player set
            currentPrice = parseFloat(document.getElementById('price-input').value) || 4.00;
            
            // Calculate how many customers show up based on price
            // Lower price = more customers. Higher price = fewer customers.
            let baseCustomers = 10;
            if (currentPrice > 6) baseCustomers -= 4;
            if (currentPrice < 3) baseCustomers += 5;
            
            // Add a little randomness to the line
            currentQueue = baseCustomers + Math.floor(Math.random() * 5);
            dailyProfit = 0;

            // Switch UI screens
            mainUI.style.display = 'none';
            shiftUI.style.display = 'block';
            updateShiftUI();
        }

        // Update the shift screen numbers
        function updateShiftUI() {
            document.getElementById('queue-display').innerText = currentQueue;
            document.getElementById('shift-beans-display').innerText = beans;
            
            // Disable serve button if we run out of beans or customers
            document.getElementById('serve-btn').disabled = (beans <= 0 || currentQueue <= 0);
        }

        // Click to serve one customer
        function serveCustomer() {
            if (beans > 0 && currentQueue > 0) {
                beans -= 1;
                currentQueue -= 1;
                cash += currentPrice;
                dailyProfit += currentPrice;
                
                updateShiftUI();

                // If the line is empty, automatically end the shift
                if (currentQueue === 0) {
                    setTimeout(() => {
                        alert(`Shift Over! You made $${dailyProfit.toFixed(2)} today.`);
                        endShift();
                    }, 300); // Tiny delay so they see the queue hit 0
                } else if (beans === 0) {
                    setTimeout(() => {
                        alert(`Out of beans! You had to turn away ${currentQueue} customers.`);
                        endShift();
                    }, 300);
                }
            }
        }

        // Close shop and go to the next day
        function endShift() {
            day += 1;
            shiftUI.style.display = 'none';
            mainUI.style.display = 'block';
            updateDashboard();
        }

        // Run once when the page loads
        updateDashboard();
    </script>
</body>
</html>
